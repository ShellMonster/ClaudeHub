<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 导航</title>
  <meta name="description" content="Claude Code 生态资源导航 - 发现优质开源项目、工具、教程和插件">
  <meta property="og:title" content="Claude Code 导航">
  <meta property="og:description" content="8,473 个 Claude Code 相关开源项目，11 个分类，实时搜索">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a class="sidebar-logo" href="#">Claude Code 导航</a>
      <button class="sidebar-close" id="sidebar-close" aria-label="关闭">✕</button>
    </div>
    <div class="sidebar-stats" id="stats"></div>
    <nav class="sidebar-nav" id="category-nav"></nav>
    <div class="sidebar-footer">
      <a href="https://github.com/ShellMonster/ClaudeHub" target="_blank" rel="noopener">GitHub</a>
      <span id="last-updated"></span>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button class="mobile-menu-btn" id="sidebar-toggle" aria-label="菜单">☰</button>
      <div class="search-box">
        <input type="text" class="search-input" id="search-input" placeholder="搜索项目名称、描述、标签..." autocomplete="off">
        <kbd class="search-shortcut">/</kbd>
      </div>
      <div class="topbar-actions">
        <select class="sort-select" id="sort-select">
          <option value="stars">按 Star</option>
          <option value="updated">按更新</option>
          <option value="score">按评分</option>
          <option value="name">按名称</option>
        </select>
        <button class="dark-toggle" id="dark-toggle" aria-label="暗黑模式">🌙</button>
      </div>
    </header>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="content" id="content">
      <div class="loading-container" id="loading">
        <div class="loading-spinner"></div>
        <p class="loading-text">正在加载资源数据...</p>
      </div>
    </div>
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-state-icon">🔍</div>
      <p class="empty-state-title">没有找到匹配的项目</p>
      <p class="empty-state-desc">试试其他关键词或清除筛选条件</p>
    </div>
  </main>
  <button class="back-to-top" id="back-to-top" aria-label="返回顶部">↑</button>
  <script src="app.js"></script>
</body>
</html>
